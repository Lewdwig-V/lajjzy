name: CI

on:
  pull_request:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test
    needs: [fmt, clippy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install jj
        run: cargo install --locked --bin jj jj-cli@0.39.0
      - run: cargo test --workspace

  # Aggregator job — the single required status check for branch protection.
  ci-pass:
    name: CI
    needs: [fmt, clippy, test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any dependency did not succeed
        run: |
          if [[ "${{ needs.fmt.result }}" != "success" ||
                "${{ needs.clippy.result }}" != "success" ||
                "${{ needs.test.result }}" != "success" ]]; then
            echo "One or more CI jobs failed or were skipped."
            echo "  fmt:    ${{ needs.fmt.result }}"
            echo "  clippy: ${{ needs.clippy.result }}"
            echo "  test:   ${{ needs.test.result }}"
            exit 1
          fi
